<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Growth With Gray</title>
  <meta name="description" content="Growth With Gray is coming soon. LMFT therapy, somatic sex therapy, and coaching with Gray Moulton.">
  <meta name="author" content="Gray Moulton, LMFT">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/typography.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/animations.css">

  <style>
    .coming-soon {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(
        135deg,
        var(--color-primary-dark) 0%,
        var(--color-primary) 50%,
        #7A3A4E 100%
      );
      color: var(--color-text-inverse);
      padding: var(--space-2xl) var(--container-padding);
    }

    .coming-soon-content {
      max-width: 600px;
    }

    .coming-soon-photo {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--color-secondary);
      margin: 0 auto var(--space-2xl);
    }

    .coming-soon h1 {
      font-size: var(--fs-hero);
      color: var(--color-text-inverse);
      margin-bottom: var(--space-lg);
    }

    .coming-soon p {
      font-size: var(--fs-body-lg);
      color: var(--color-secondary-light);
      line-height: var(--lh-body);
    }
  </style>
</head>
<body>
  <main>
    <section class="coming-soon">
      <div class="coming-soon-content">
        <p style="font-family: var(--font-heading); font-size: var(--fs-h1); font-weight: var(--fw-bold); margin-bottom: var(--space-2xl);">Growth <span style="font-style: italic; font-weight: var(--fw-light);">With</span> Gray</p>
        <img src="images/gray_moulton2.jpg" alt="Gray Moulton" class="coming-soon-photo">
        <h1>Coming Soon</h1>
        <p>Growth With Gray is a space for embodied healing, deeper connection, and personal growth. Gray Moulton is a Somatic Sex coach offering guidance and support to help you reconnect with your body and step into the fullest version of yourself.</p>
      </div>
    </section>
  </main>
</body>
</html>
